message InventoryItemPropertyDefinition {  string name = 1;  PropertyType propertyType = 2;  bool saveInTrade = 3;  PropertySetByType setByType = 4;  RetrievableType retrievable = 5;  int32 boundExclusive = 6;}
message Banned {  bool banned = 1;  int64 untilDate = 2;}
message Group {  string id = 1;  string name = 2;  string avatarId = 3;  repeated Player players = 4;}
message ExternalLink {  ExternalPlatform platform = 1;  string url = 2;}
message MatchPlayer {  string gpid = 1;  string uid = 2;  string name = 3;  string avatarId = 4;  repeated Property properties = 5;  MatchPlayerReward reward = 6;  bool deleted = 7;}
message MatchClan {  string clanId = 1;  string clanName = 2;  string clanTag = 3;  string avatarId = 4;  repeated MatchPlayer players = 5;  repeated Property properties = 6;  MatchClanReward reward = 7;}
message GamePassProgress {  string id = 1;  int32 currentLevel = 2;  repeated int32 levelsToClaimReward = 3;}
message ChallengeProgress {  string id = 1;  int32 points = 2;  bool completed = 3;  bool rewardsObtained = 4;}
message OperationValuePair {  OperationValuePair_Types_Operation operation = 2;  OperationValuePair_ValueOneofCase valueCase = 4;}
message Attribute {  PropertyType type = 1;  int32 int = 2;  float float = 3;  string string = 4;  bool boolean = 5;}
message DlcFile {  repeated string resourceUrls = 1;  int64 fileSizeInBytes = 2;  string signature = 3;  repeated Property properties = 4;  string fileName = 5;}
message ExchangeEntity {  repeated InventoryItemAmount items = 1;  repeated CurrencyAmount currencies = 2;}
message GamePassLevel {  int32 level = 1;  int32 minPoints = 2;  RewardInfo reward = 3;  int32 reoccurringPoints = 4;}
message DayRange {  int32 from = 1;  int32 to = 2;}
message MatchPlayerReward {  repeated PlayerStat stats = 1;}
message MatchClanReward {  ClanStats stats = 1;}
